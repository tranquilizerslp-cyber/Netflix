<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Netflix-style landing page clone">
    <link rel="stylesheet" href="./style.css">
    <title>Netflix Landing Page</title>
</head>
<body>
    <nav>
        <h1> <img src="./multimedia/lettring.png" alt=""></h1>
        <p>
            <button>Sign in</button>
        </p>
    </nav>
    
    <section class="section">
        <h2 class="h3">
            Unlimited movies, TV <br> shows, and more
        </h2>
        <p class="p1">
            Starts at ₦2,500. Cancel anytime.
        </p>
        <p class="p2">
            Ready to watch? Enter your email to create or restart your membership.
        </p>
        <div class="email-row">
            <input class="email-input" type="email" placeholder="Enter your email address" aria-label="Email address">
            <button class="button2">Get started &gt;</button>
        </div>
    </section>

    <section class="section2">
        <img src="./multimedia/apex.webp" alt="Apex promotional image">
        <img src="./multimedia/beauty-black.webp" alt="Beauty Black promotional image">
        <img src="./multimedia/thrash.webp" alt="Thrash promotional image">
        <img src="./multimedia/war-machine.webp" alt="War Machine promotional image">
    </section>
</body>
</html>
